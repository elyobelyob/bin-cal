name: First Request — Generate ICS

on:
  workflow_dispatch:
    inputs:
      hash:
        description: "8-char address hash (filename slug)"
        required: true
        type: string
      council_id:
        description: "Module ID e.g. kirklees_gov_uk"
        required: true
        type: string
      council_title:
        description: "Human-readable council name"
        required: true
        type: string
      args_json:
        description: "JSON-encoded source args e.g. {\"postcode\":\"HD9 6RJ\",\"door_num\":\"1\"}"
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if ICS already exists (skip if up to date)
        id: check
        run: |
          if [ -f "calendars/${{ inputs.hash }}.ics" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Clone waste_collection_schedule
        run: |
          git clone --depth=1 https://github.com/mampfes/hacs_waste_collection_schedule.git wcs_repo
          rm -f wcs_repo/custom_components/waste_collection_schedule/calendar.py
          cp scripts/patches/kirklees_gov_uk.py wcs_repo/custom_components/waste_collection_schedule/waste_collection_schedule/source/kirklees_gov_uk.py

      - name: Install dependencies
        run: |
          pip install --quiet \
            beautifulsoup4 \
            DateTime \
            python-dateutil \
            pytz \
            requests \
            lxml \
            pycryptodome \
            curl_cffi \
            jinja2 \
            pypdf \
            "pdfminer.six" \
            icalendar \
            icalevents

      - name: Generate ICS
        env:
          WCS_REPO: wcs_repo
          INPUT_COUNCIL_ID: ${{ inputs.council_id }}
          INPUT_COUNCIL_TITLE: ${{ inputs.council_title }}
          INPUT_ARGS_JSON: ${{ inputs.args_json }}
          INPUT_HASH: ${{ inputs.hash }}
        run: |
          python3 scripts/generate_ics.py \
            --council-id "$INPUT_COUNCIL_ID" \
            --council-title "$INPUT_COUNCIL_TITLE" \
            --args "$INPUT_ARGS_JSON" \
            --hash "$INPUT_HASH" \
            --output-dir calendars \
            --wcs-repo wcs_repo

      - name: Update users.json
        env:
          INPUT_HASH: ${{ inputs.hash }}
          INPUT_COUNCIL_ID: ${{ inputs.council_id }}
          INPUT_COUNCIL_TITLE: ${{ inputs.council_title }}
          INPUT_ARGS_JSON: ${{ inputs.args_json }}
        run: |
          python3 - <<'EOF'
          import json, os, datetime

          users_path = "users.json"
          with open(users_path) as f:
              users = json.load(f)

          h             = os.environ["INPUT_HASH"]
          council_id    = os.environ["INPUT_COUNCIL_ID"]
          council_title = os.environ["INPUT_COUNCIL_TITLE"]
          args_json     = os.environ["INPUT_ARGS_JSON"]

          if h not in users:
              users[h] = {
                  "council_id":    council_id,
                  "council_title": council_title,
                  "args":          json.loads(args_json),
                  "added":         datetime.date.today().isoformat(),
              }
          users[h]["last_updated"] = datetime.date.today().isoformat()

          with open(users_path, "w") as f:
              json.dump(users, f, indent=2)
          EOF

      - name: Commit and push
        env:
          INPUT_HASH: ${{ inputs.hash }}
          INPUT_COUNCIL_TITLE: ${{ inputs.council_title }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "calendars/$INPUT_HASH.ics" users.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Add calendar for $INPUT_HASH ($INPUT_COUNCIL_TITLE)"
          git push
